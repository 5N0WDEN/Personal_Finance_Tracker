{% extends 'home.html' %}
{% load static %}


{% block content %}


<div class="row">
    <div class="col-md-4"></div>
    <div class="col-md-4">
        <div class="card mt-4">
            <div class="card-body">
                <div class="card-title py-3">
                    <h4>Set your new password</h4>
                </div>
                <form action="{% url 'reset-user-password' uidb64 token %}" method="post">
                    {% csrf_token %}

                    {% include 'partials/_messages.html' %}

                    <p class="text-sm text-success emailSuccessOutput"></p>
                    <div class="form-group">
                        <input 
                            type="password1" 
                            name="password1"
                            id="passwordField" 
                            placeholder="Password"
                            class="form-control form-control-sm mt-2"
                            required
                        >
                    </div>
                    <p class="text-sm text-success emailSuccessOutput"></p>
                    <div class="form-group">
                        <input 
                            type="password2" 
                            name="password2"
                            id="passwordField" 
                            placeholder="Conform Password"
                            class="form-control form-control-sm mt-2"
                            required
                        >
                    </div>
                    <div class="d-grid">
                        <input type="submit" value="Submit" class="btn btn-block btn-primary mt-2 submit-btn">
                    </div>
                </form>
                <div class="container">
                    <span class="text-lead lead">Have an account?</span><a href="{% url 'login' %}">Register</a><br>
                    <span class="text-lead lead">No account?</span><a href="{% url 'register' %}">Register Here</a>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4"></div>
</div>
<script src="{% static 'js\register.js' %}"></script>

{% endblock content %}
