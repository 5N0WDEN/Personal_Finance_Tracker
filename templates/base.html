{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="auto">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinTrack {% block title %}
        {% endblock %}
    </title>

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!--<link href="{% static 'css/main.css'%}" rel="stylesheet">-->
    <!-- Custom styles for this template -->
    <!--<link href="{% static 'css/dashboard.css' %}" rel="stylesheet">-->
  </head>
  <body>

    <header class="navbar navbar-expand-lg navbar-light bg-light bg-primary sticky-top flex-md-nowrap shadow">
      <a class="navbar-brand me-0 px-3 fs-6 text-white w-10" href="" style="color: black !important;"><b>FINTRACK</b></a>
      <div class="d-flex flex-grow-1 justify-content-end align-items-center">
        <div class="input-group rounded w-auto">
          <!--<input type="text" class="form-control form-control-sm h-30 p-2 rounded" placeholder="Search" aria-label="Search" aria-describedby="button-search">
          <button class="btn btn-secondary rounded" type="button" id="button-search">Search</button>-->
          <ul class="navbar-nav px-5">
            <li class="nav-item text-nowrap">
              <a href="{% url 'profile' %}" class="nav-link ml-2">
                PROFILE(<b>{{request.user}}</b>)
              </a>
            </li>
            <li class="nav-item text-nowrap">
              <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <input type="submit" class="btn btn-secondary rounded" value="Sign out">
              </form>
            </li>
          </ul>
        </div>
      </div> 
    </header>
    

<div class="container-fluid">
  <div class="row">
    {% include 'partials/_sidebar.html' %}
    
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 sidebar">
      <div class="container-fluid">
      {% block content %}
      
      
      
      
      
      {% endblock %}
      </div>
    </main>
  </div>
</div>
    <script src="{% static 'js/main.js' %}"></script></body>
</html>
