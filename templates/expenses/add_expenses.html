{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'expenses' %}">Expences</a></li>
        <li class="breadcrumb-item active" aria-current="page">Add Expences</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
            <div class="card mt-4">
                <div class="card-body">
                    <form action="{% url 'add-expenses' %}" method="post">
                    {% csrf_token %}
                    {% include 'partials/_messages.html' %}
                        <div class="form-group mt-2">
                            <label for="">Amount</label>
                            <input 
                                type="text" 
                                class="form-control form-control-sm" 
                                name="amount"
                                value="{{values.amount}}"
                            >
                        </div>
                        <div class="form-group mt-2">
                            <label for="">Description</label>
                            <input 
                                type="text" 
                                class="form-control form-control-sm" 
                                name="description"
                                value="{{values.description}}"
                            >
                        </div>
                    
                        <div class="form-group mt-2">
                            <label for="">Category</label>
                            <select name="category" class="form-control form-control-sm">
                                {% if values and values.category %}
                                <option name="category" value="{{values.category}}" selected>{{values.category}}</option>
                                {% endif %}
                                {% for category in categories %}
                                <option name="category" value="{{category.name}}">
                                    {{category.name}}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group mt-2">
                            <label for="">Date of Expense</label>
                            <input 
                                type="date" 
                                class="form-control form-control-sm" 
                                name="expense_date"
                                value="{{values.expense_date}}"
                            >
                        </div>
                        <div class="form-group mb-3">
                            <label for="formFile" class="form-label">Add receipt(Optional):</label>
                            <input class="form-control" type="file" id="formFile" name="receipt">
                        </div>
                        <div class="d-grid">
                            <input 
                                type="submit" 
                                value="Save" 
                                class="btn btn-primary btn-primary-sm mt-2 rounded"
                            >
                        </div>
                    </ul>
                    </form>
                </div>
            </div>  
        </div>
        <div class="col-md-4"></div>
    </div>

</div>


{% endblock %}
