{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'income' %}">Income</a></li>
        <li class="breadcrumb-item active" aria-current="page">Add Income</li>
        </ol>
    </nav>

    <div class="row">
        <div class="col-md-4"></div>
        <div class="col-md-4">
            <div class="card mt-4">
                <div class="card-body">
                    <form action="{% url 'add-income' %}" method="post">
                    {% csrf_token %}
                    {% include 'partials/_messages.html' %}
                        <div class="form-group mt-2">
                            <label for="">Amount</label>
                            <input 
                                type="text" 
                                class="form-control form-control-sm" 
                                name="amount"
                                value="{{values.amount}}"
                            >
                        </div>
                        <div class="form-group mt-2">
                            <label for="">Description</label>
                            <input 
                                type="text" 
                                class="form-control form-control-sm" 
                                name="description"
                                value="{{values.description}}"
                            >
                        </div>
                    
                        <div class="form-group mt-2">
                            <label for="">Source</label>
                            <select name="source" class="form-control form-control-sm">
                                {% if values and values.source %}
                                <option name="source" value="{{values.source}}" selected>{{values.source}}</option>
                                {% endif %}
                                {% for source in sources %}
                                <option name="source" value="{{source.name}}">
                                    {{source.name}}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group mt-2">
                            <label for="">Date of Income</label>
                            <input 
                                type="date" 
                                class="form-control form-control-sm" 
                                name="income_date"
                                value="{{values.income_date}}"
                            >
                        </div>
                        <div class="d-grid">
                            <input 
                                type="submit" 
                                value="Save" 
                                class="btn btn-primary btn-primary-sm mt-2 rounded"
                            >
                        </div>
                    </ul>
                    </form>
                </div>
            </div>  
        </div>
        <div class="col-md-4"></div>
    </div>

</div>


{% endblock %}
