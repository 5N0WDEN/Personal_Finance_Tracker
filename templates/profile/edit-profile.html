{% extends 'base.html' %}

{% block content %}
<div class="container mt-3">
    <div class="row justify-content-center">
            <h2>Edit Profile</h2>
            <form method="post" action="{% url 'profile' %}">
                {% csrf_token %}
                <div class="row">
                <div class="col-md-6">    
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Personal Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-group mb-3">
                            <label for="id_username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="id_username" name="username" value="{{ user.username }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="id_email" name="email" value="{{ user.email }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="id_first_name" name="first_name" value="{{ user.first_name }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="id_last_name" name="last_name" value="{{ user.last_name }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_dob" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="id_dob" name="dob" value="{{ profile.dob }}">
                        </div>
                    </div>
                </div>
                </div>
                <div class="col-md-6">    
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Contact Information</h5>
                    </div>
                    <div class="card-body">
                        <div class="form-group mb-3">
                            <label for="id_phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="id_phone" name="phone" value="{{ profile.phone }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="id_address" name="address" value="{{ profile.address }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_city" class="form-label">City</label>
                            <input type="text" class="form-control" id="id_city" name="city" value="{{ profile.city }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_state" class="form-label">State</label>
                            <input type="text" class="form-control" id="id_state" name="state" value="{{ profile.state }}">
                        </div>
                        <div class="form-group mb-3">
                            <label for="id_country" class="form-label">Country</label>
                            <input type="text" class="form-control" id="id_country" name="country" value="{{ profile.country }}">
                        </div>
                    </div>
                </div>
                </div>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
    </div>
</div>
{% endblock %}
